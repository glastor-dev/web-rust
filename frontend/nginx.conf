server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Habilitar compresión Gzip para mejorar performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Redirigir todas las rutas a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets estáticos (fuentes, imágenes, JS, CSS compilado)
    location ~* \.(?:css|js|jpg|svg|png|gif|ico|eot|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }
}
