version: '3.8'

services:
  # ==========================================
  # Frontend: Nginx sirviendo la SPA de React
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glastor-frontend
    ports:
      - "80:80"   # Expuesto al mundo en el puerto 80
    depends_on:
      - backend   # Se asegura de que el backend inicie primero
    restart: unless-stopped
    networks:
      - glastor-network

  # ==========================================
  # Backend: Servidor concurrente en Rust
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glastor-backend
    ports:
      - "3000:3000" # Expuesto al mundo (o al frontend interno)
    restart: unless-stopped
    volumes:
      - backend-data:/app
    networks:
      - glastor-network

# Definición de la red interna de Docker para que se comuniquen
networks:
  glastor-network:
    driver: bridge

volumes:
  backend-data:
