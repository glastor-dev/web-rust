name: Auto-Update README

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "README.md"
      - "README.generated.md"
  schedule:
    - cron: "0 3 * * 1" # Lunes a las 03:00 UTC (ajusta si prefieres otro dÃ­a/hora)
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Actualizar fecha en README.profile.md
        run: |
          fecha=$(date +'%Y-%m-%d')
          sed -i "s/Ãšltima actualizaciÃ³n: .*/Ãšltima actualizaciÃ³n: $fecha/" README.profile.md

      - name: Generate README
        run: cargo run -- --force

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update README [skip ci]" && git push)

