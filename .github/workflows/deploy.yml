name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Build Frontend (Next.js)
        working-directory: ./frontend
        run: |
          pnpm install
          pnpm run build
          tar -czf frontend-build.tar.gz .next/standalone .next/static public package.json

      - name: Copy Build to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          source: "frontend/frontend-build.tar.gz,docker-compose.yml"
          target: "/root/web-rust"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            cd ~/web-rust
            
            # Extraer la app compilada
            cd frontend
            tar -xzf frontend-build.tar.gz
            rm frontend-build.tar.gz
            
            # Crear un Dockerfile ultra-ligero que NO compila, solo copia los archivos
            cat << 'EOF' > Dockerfile
            FROM node:20-alpine
            WORKDIR /app
            COPY .next/standalone ./
            COPY .next/static ./.next/static
            COPY public ./public
            EXPOSE 3000
            ENV PORT=3000
            ENV HOSTNAME="0.0.0.0"
            CMD ["node", "server.js"]
            EOF
            cd ..
            
            # Reiniciar solo el frontend (toma 1 segundo, 0 de RAM)
            docker compose build frontend
            docker compose up -d frontend
