name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend (Next.js)
        working-directory: ./frontend
        run: |
          npx pnpm install
          npx pnpm run build
          tar -czf frontend-build.tar.gz .next/standalone .next/static public package.json

      - name: Build Backend (Rust)
        working-directory: ./backend
        run: |
          # Usamos docker para compilar el backend usando la etapa builder del Dockerfile existente
          docker build --target builder -t backend-builder .
          docker create --name temp-container backend-builder
          docker cp temp-container:/app/target/release/backend ./backend-binary
          docker rm temp-container
          tar -czf backend-build.tar.gz backend-binary migrations

      - name: Copy Build to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "frontend/frontend-build.tar.gz,backend/backend-build.tar.gz,docker-compose.yml"
          target: "/root/web-rust"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd ~/web-rust
            
            # Extraer y preparar frontend
            cd frontend
            tar -xzf frontend-build.tar.gz
            rm frontend-build.tar.gz
            
            cat << 'EOF' > Dockerfile
            FROM node:20-alpine
            WORKDIR /app
            COPY .next/standalone ./
            COPY .next/static ./.next/static
            COPY public ./public
            EXPOSE 3000
            ENV PORT=3000
            ENV HOSTNAME="0.0.0.0"
            CMD ["node", "server.js"]
            EOF
            cd ..
            
            # Extraer y preparar backend
            mkdir -p backend
            cd backend
            tar -xzf backend-build.tar.gz
            rm backend-build.tar.gz
            
            cat << 'EOF' > Dockerfile
            FROM debian:bookworm-slim
            RUN apt-get update && apt-get install -y libssl3 ca-certificates sqlite3 && rm -rf /var/lib/apt/lists/*
            WORKDIR /app
            COPY backend-binary /usr/local/bin/backend
            COPY migrations ./migrations
            EXPOSE 3001
            CMD ["backend"]
            EOF
            cd ..
            
            # Reiniciar los servicios
            docker compose build frontend backend
            docker compose up -d frontend backend
