name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          tags: web-rust-frontend:latest
          outputs: type=docker,dest=/tmp/frontend.tar
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: web-rust-backend:latest
          outputs: type=docker,dest=/tmp/backend.tar
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Compress Images
        run: |
          cat /tmp/frontend.tar /tmp/backend.tar | gzip > images.tar.gz

      - name: Copy Images and Config to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          source: "images.tar.gz,docker-compose.yml"
          target: "/root/web-rust"

      - name: Load and Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            cd ~/web-rust
            
            echo "Cargando nuevas imagenes de Docker..."
            docker load -i images.tar.gz
            rm images.tar.gz
            
            echo "Reiniciando servicios..."
            docker compose up -d --no-build
